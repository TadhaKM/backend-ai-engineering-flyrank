<!DOCTYPE html>
<!--
  A trimmed but structurally faithful copy of a books.toscrape.com catalogue page:
  https://books.toscrape.com/catalogue/page-1.html

  Three books instead of twenty, but the shape is the real one:
    - each book is an <article class="product_pod">, linked from an <h3> <a>
    - the hrefs are RELATIVE to this page ("a-light-in-the-attic_1000/index.html")
    - pagination is a single <li class="next"> link; there is no "last page" link,
      which is why the crawler follows the chain instead of guessing page numbers
-->
<html lang="en-us" class="no-js">
  <head>
    <meta charset="utf-8" />
    <title>Books to Scrape - Sandbox</title>
  </head>
  <body class="default">
    <div class="page_inner">
      <div class="content">
        <section>
          <div>
            <ol class="row">
              <li class="col-xs-6 col-sm-4 col-md-3 col-lg-3">
                <article class="product_pod">
                  <div class="image_container">
                    <a href="a-light-in-the-attic_1000/index.html">
                      <img src="../media/cache/2c/da/2cda.jpg" alt="A Light in the Attic" class="thumbnail" />
                    </a>
                  </div>
                  <p class="star-rating Three"></p>
                  <h3>
                    <a href="a-light-in-the-attic_1000/index.html" title="A Light in the Attic">A Light in the ...</a>
                  </h3>
                  <div class="product_price">
                    <p class="price_color">£51.77</p>
                    <p class="instock availability"><i class="icon-ok"></i> In stock</p>
                  </div>
                </article>
              </li>

              <li class="col-xs-6 col-sm-4 col-md-3 col-lg-3">
                <article class="product_pod">
                  <div class="image_container">
                    <a href="tipping-the-velvet_999/index.html">
                      <img src="../media/cache/26/0c/260c.jpg" alt="Tipping the Velvet" class="thumbnail" />
                    </a>
                  </div>
                  <p class="star-rating One"></p>
                  <h3>
                    <a href="tipping-the-velvet_999/index.html" title="Tipping the Velvet">Tipping the Velvet</a>
                  </h3>
                  <div class="product_price">
                    <p class="price_color">£53.74</p>
                    <p class="instock availability"><i class="icon-ok"></i> In stock</p>
                  </div>
                </article>
              </li>

              <li class="col-xs-6 col-sm-4 col-md-3 col-lg-3">
                <article class="product_pod">
                  <div class="image_container">
                    <a href="soumission_998/index.html">
                      <img src="../media/cache/3e/ef/3eef.jpg" alt="Soumission" class="thumbnail" />
                    </a>
                  </div>
                  <p class="star-rating One"></p>
                  <h3><a href="soumission_998/index.html" title="Soumission">Soumission</a></h3>
                  <div class="product_price">
                    <p class="price_color">£50.10</p>
                    <p class="instock availability"><i class="icon-ok"></i> In stock</p>
                  </div>
                </article>
              </li>
            </ol>

            <div>
              <ul class="pager">
                <li class="current">Page 1 of 50</li>
                <li class="next"><a href="page-2.html">next</a></li>
              </ul>
            </div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>

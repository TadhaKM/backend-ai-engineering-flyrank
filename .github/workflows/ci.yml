name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Format, lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # The workspace is bilingual from assignment-04 onwards: the Node
      # assignments import @flyrank/shared, the Python ones import flyrank_shared.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: npm ci

      - name: Install Python dependencies
        run: npm run setup:py

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (Vitest)
        run: npm test

      # Never hits the network: the parser tests run against saved HTML fixtures.
      - name: Test (pytest)
        run: npm run test:py
